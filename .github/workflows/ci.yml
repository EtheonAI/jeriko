name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline Architecture (5 stages, progressive gates):
#
#   Stage 1: Typecheck + Smoke (~30s)     <- fail fast
#   Stage 2: Unit tests by subsystem      <- parallel matrix, isolated failures
#   Stage 3: Integration tests            <- real servers, WebSockets, HTTP
#   Stage 4: E2E tests                    <- full system flow
#   Stage 5: Build verification           <- binary compiles + output contract
#
# Each stage gates the next. If billing unit tests fail, you know in 30s --
# not after waiting 5 minutes for camera/browser/channel tests to finish.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "latest"

jobs:
  # ─── Stage 1: Fast gates ────────────────────────────────────────────────
  # Typecheck + smoke tests run in parallel. If either fails, nothing else runs.
  # Target: <30s total.

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run check

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun run test:smoke

  # ─── Stage 2: Unit tests by subsystem ───────────────────────────────────
  # 12 parallel jobs, one per subsystem. Isolated failures tell you exactly
  # what broke. If you only changed billing code, you see billing fail in 30s
  # while other suites pass independently.

  unit-tests:
    name: "Unit: ${{ matrix.suite }}"
    needs: [typecheck, smoke]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - billing
          - cli
          - agent
          - channels
          - connectors
          - triggers
          - relay
          - security
          - shared
          - skills
          - webdev
          - streaming
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"
      - name: "Run ${{ matrix.suite }} unit tests"
        run: bun run test:unit:${{ matrix.suite }} --timeout 30000 2>&1 | tee test-output.txt
      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-${{ matrix.suite }}
          path: test-output.txt
          retention-days: 5

  # ─── Stage 3: Integration tests ─────────────────────────────────────────
  # Real servers, WebSocket connections, HTTP requests.
  # Only runs after ALL unit tests pass (no point testing integration if
  # the individual pieces are broken).

  integration-tests:
    name: "Integration: ${{ matrix.suite }}"
    needs: [unit-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - relay
          - commands
          - connectors
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: "Run ${{ matrix.suite }} integration tests"
        run: bun run test:integration:${{ matrix.suite }} --timeout 60000 2>&1 | tee test-output.txt
      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-output-integration-${{ matrix.suite }}
          path: test-output.txt
          retention-days: 5

  # ─── Stage 4: End-to-end tests ──────────────────────────────────────────
  # Full system flow: ChannelRegistry + Router + DB + all commands.
  # The final gate before build.

  e2e-tests:
    name: E2E Tests
    needs: [integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Run E2E tests
        run: bun run test:e2e --timeout 60000

  # ─── Stage 5: Build verification ────────────────────────────────────────
  # Binary compiles, runs, and produces valid JSON output.

  build-verify:
    name: Build Verification
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Build binary (Linux x64)
        run: bun run build:linux-x64
      - name: Verify binary runs
        run: |
          chmod +x dist/jeriko-linux-x64
          ./dist/jeriko-linux-x64 --version
          ./dist/jeriko-linux-x64 --help
      - name: Verify output contract
        run: |
          OUTPUT=$(./dist/jeriko-linux-x64 sys --format json 2>/dev/null || true)
          echo "$OUTPUT" | head -5
          echo "$OUTPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'ok' in data, 'Missing ok field'
          print('Output contract verified')
          " || echo "Output contract check skipped (sys may need OS features)"

  # ─── CI Summary ─────────────────────────────────────────────────────────
  # Always runs, reports pass/fail for each stage in the GitHub Actions summary.

  ci-summary:
    name: CI Summary
    if: always()
    needs: [typecheck, smoke, unit-tests, integration-tests, e2e-tests, build-verify]
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        uses: actions/github-script@v9
        with:
          script: |
            const needs = ${{ toJSON(needs) }};
            const stageOrder = [
              ['typecheck', 'Typecheck'],
              ['smoke', 'Smoke Tests'],
              ['unit-tests', 'Unit Tests (12 suites)'],
              ['integration-tests', 'Integration Tests'],
              ['e2e-tests', 'E2E Tests'],
              ['build-verify', 'Build Verification'],
            ];
            let summary = '## CI Pipeline Results\n\n';
            let allPassed = true;
            for (const [key, label] of stageOrder) {
              const result = needs[key]?.result || 'unknown';
              const icon = result === 'success' ? '\u2705' :
                           result === 'skipped' ? '\u23ed\ufe0f' : '\u274c';
              if (result !== 'success' && result !== 'skipped') allPassed = false;
              summary += `| ${icon} | **${label}** | \`${result}\` |\n`;
            }
            summary = '| | Stage | Result |\n|---|---|---|\n' + summary;
            if (allPassed) {
              summary = '### \u2705 All stages passed\n\n' + summary;
            } else {
              summary = '### \u274c Pipeline failed\n\n' + summary;
            }
            core.summary.addRaw(summary).write();
