name: Integration

on:
  push:
    branches: [main]
    paths:
      - 'src/daemon/**'
      - 'src/shared/**'
      - 'apps/relay/**'
      - 'test/integration/**'
      - 'test/e2e/**'
  schedule:
    # Weekly on Sundays at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  relay:
    name: Relay Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Relay E2E tests
        run: bun test test/integration/relay-e2e.test.ts --timeout 60000

  channels:
    name: Channel Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Channel connector integration
        run: bun test test/integration/channel-connectors.test.ts --timeout 60000

  commands:
    name: Command Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Command integration tests
        run: bun test test/integration/commands.test.ts --timeout 60000

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: E2E channel commands
        run: bun test test/e2e/ --timeout 60000

  billing:
    name: Billing Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Billing unit tests
        run: bun test test/unit/billing/ --timeout 30000

  connectors:
    name: Connector Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Connector tests
        run: bun test test/unit/connectors.test.ts test/unit/oauth.test.ts --timeout 30000

  triggers:
    name: Trigger Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Trigger tests
        run: bun test test/unit/trigger-engine.test.ts test/unit/trigger-routes.test.ts test/unit/email-trigger.test.ts --timeout 30000
