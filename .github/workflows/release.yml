name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Gate: Tests must pass ──────────────────────────────────────
  gate:
    name: Pre-Release Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun

      - name: Typecheck
        run: bun run check

      - name: Unit tests
        run: bun test test/unit/ --timeout 30000

      - name: Integration tests
        run: bun test test/integration/ --timeout 60000

  # ── Build all platforms ────────────────────────────────────────
  build:
    name: Build Release
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"\([0-9][^"]*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build all platforms
        env:
          BAKED_RELAY_AUTH_SECRET: ${{ secrets.BAKED_RELAY_AUTH_SECRET }}
          BAKED_POSTHOG_KEY: ${{ secrets.BAKED_POSTHOG_KEY }}
          BAKED_GITHUB_CLIENT_ID: ${{ secrets.BAKED_GITHUB_CLIENT_ID }}
          BAKED_GOOGLE_CLIENT_ID: ${{ secrets.BAKED_GOOGLE_CLIENT_ID }}
          BAKED_X_CLIENT_ID: ${{ secrets.BAKED_X_CLIENT_ID }}
          BAKED_VERCEL_CLIENT_ID: ${{ secrets.BAKED_VERCEL_CLIENT_ID }}
          BAKED_STRIPE_CLIENT_ID: ${{ secrets.BAKED_STRIPE_CLIENT_ID }}
          BAKED_HUBSPOT_CLIENT_ID: ${{ secrets.BAKED_HUBSPOT_CLIENT_ID }}
          BAKED_SHOPIFY_CLIENT_ID: ${{ secrets.BAKED_SHOPIFY_CLIENT_ID }}
          BAKED_SLACK_CLIENT_ID: ${{ secrets.BAKED_SLACK_CLIENT_ID }}
          BAKED_PAYPAL_CLIENT_ID: ${{ secrets.BAKED_PAYPAL_CLIENT_ID }}
        run: bash scripts/release.sh

      - name: List artifacts
        run: ls -lah dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          retention-days: 3

  # ── Verify on each platform ────────────────────────────────────
  verify-macos:
    name: Verify macOS
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist/

      - name: Verify darwin-arm64
        run: |
          chmod +x dist/jeriko-darwin-arm64
          ./dist/jeriko-darwin-arm64 --version
          echo "macOS arm64 OK"

  verify-windows:
    name: Verify Windows
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist/

      - name: Verify windows-x64
        shell: pwsh
        run: |
          & .\dist\jeriko-windows-x64.exe --version
          Write-Host "Windows x64 OK"

  verify-linux:
    name: Verify Linux
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist/

      - name: Verify linux-x64
        run: |
          chmod +x dist/jeriko-linux-x64
          ./dist/jeriko-linux-x64 --version
          echo "Linux x64 OK"

  # ── Upload to CDN ──────────────────────────────────────────────
  upload-cdn:
    name: Upload to CDN
    needs: [build, verify-macos, verify-windows, verify-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist/

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          BUCKET="${JERIKO_R2_BUCKET:-jeriko-releases}"

          # Upload each binary
          for f in dist/jeriko-*; do
            filename=$(basename "$f")
            echo "Uploading $filename..."
            wrangler r2 object put "${BUCKET}/releases/${VERSION}/${filename}" \
              --file "$f" --content-type "application/octet-stream" --remote
          done

          # Upload manifest
          wrangler r2 object put "${BUCKET}/releases/${VERSION}/manifest.json" \
            --file dist/manifest.json --content-type "application/json" --remote

          # Upload templates
          if [ -f dist/templates.tar.gz ]; then
            wrangler r2 object put "${BUCKET}/releases/${VERSION}/templates.tar.gz" \
              --file dist/templates.tar.gz --content-type "application/gzip" --remote
          fi

          # Upload agent prompt
          if [ -f dist/agent.md ]; then
            wrangler r2 object put "${BUCKET}/releases/${VERSION}/agent.md" \
              --file dist/agent.md --content-type "text/markdown" --remote
          fi

          # Update latest pointer
          echo -n "$VERSION" > dist/latest
          wrangler r2 object put "${BUCKET}/releases/latest" \
            --file dist/latest --content-type "text/plain" --remote

          echo "CDN upload complete: $VERSION"

  # ── Create GitHub Release ──────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [build, verify-macos, verify-windows, verify-linux, upload-cdn]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist/

      - name: Determine prerelease
        id: prerelease
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if echo "$VERSION" | grep -qE '(alpha|beta|rc)'; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"

          # Collect assets
          ASSETS=""
          for f in dist/jeriko-*; do
            ASSETS="$ASSETS $f"
          done
          ASSETS="$ASSETS dist/manifest.json"
          [ -f dist/templates.tar.gz ] && ASSETS="$ASSETS dist/templates.tar.gz"
          [ -f dist/agent.md ] && ASSETS="$ASSETS dist/agent.md"

          gh release create "v${VERSION}" \
            --title "Jeriko v${VERSION}" \
            --generate-notes \
            ${{ steps.prerelease.outputs.flag }} \
            $ASSETS
