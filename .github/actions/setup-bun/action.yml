name: Setup Bun Environment
description: Install Bun, restore cache, and install dependencies

inputs:
  bun-version:
    description: Bun version to install
    default: latest
  working-directory:
    description: Directory to run bun install in
    default: "."
  install-args:
    description: Extra arguments for bun install
    default: ""

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
        key: deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: deps-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install ${{ inputs.install-args }}
